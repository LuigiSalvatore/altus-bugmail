<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bugzilla Tracker</title>
<meta name="description" content="Personal Bugzilla bug tracker — manage, prioritize, and commit from one place.">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#7c6cf5">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- Header -->
  <header>
    <div class="header-brand">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
      Bugzilla Tracker
    </div>
    <div class="header-actions">
      <button class="btn btn-outline btn-sm" id="btn-refresh">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
        Refresh
      </button>
      <button class="btn btn-danger btn-sm" id="btn-stop">Stop Server</button>
      <button class="btn btn-outline btn-sm" id="btn-restart">Restart Server</button>
      <button class="btn btn-ghost btn-icon" id="btn-settings" title="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
      </button>
    </div>
  </header>

  <!-- Status Bar -->
  <div id="status-bar">
    <div id="status-dot"></div>
    <span id="status-text">Connecting…</span>
    <div class="spacer"></div>
    <span id="status-refresh">Next refresh in <span id="countdown">60</span>s</span>
  </div>

  <!-- Main -->
  <div id="main">
    <!-- Left nav -->
    <nav id="tab-nav">
      <button class="tab-btn active" data-panel="current">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Current Bug
      </button>
      <button class="tab-btn" data-panel="bugs">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
        All Bugs
      </button>
      <button class="tab-btn" data-panel="commit">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/></svg>
        Commit Prompt
      </button>
      <button class="tab-btn" data-panel="logs">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        Logs
      </button>
    </nav>

    <div id="panels">

      <!-- ── Panel: Current Bug ── -->
      <div class="panel active" id="panel-current">
        <div class="top-row">
          <span class="section-title">Current Bug</span>
          <div class="spacer"></div>
          <button class="btn btn-primary btn-sm" id="btn-add-bug">+ Add Bug</button>
          <button class="btn btn-success btn-sm" id="btn-complete">✓ Complete</button>
          <button class="btn btn-outline btn-sm" id="btn-hold">⏸ Put On Hold</button>
        </div>

        <!-- Current bug card -->
        <div class="card" id="current-bug-card" style="flex:1;overflow:hidden;display:flex;flex-direction:column;">
          <div id="current-bug-empty">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>
            <span>No bug currently being worked on</span>
            <button class="btn btn-primary btn-sm" id="btn-add-bug-empty">+ Add Current Bug</button>
          </div>
          <div id="current-bug-details" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
            <div id="current-bug-header">
              <div>
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
                  <span id="current-bug-id"></span>
                  <span id="current-bug-status-badge" class="badge"></span>
                </div>
                <div id="current-bug-summary"></div>
              </div>
              <a id="current-bug-link" href="#" target="_blank" class="btn btn-outline btn-sm" title="Open in Bugzilla">↗ Open</a>
            </div>
            <div class="bug-meta-grid" id="current-bug-meta"></div>
            <div id="current-bug-body">
              <div class="bug-section-label">Description</div>
              <div class="bug-description" id="current-bug-desc"></div>
              <div class="bug-section-label" id="comments-label" style="display:none;">Comments</div>
              <div id="current-bug-comments"></div>
            </div>
          </div>
        </div>

        <!-- On Hold -->
        <div class="card" id="hold-panel" style="flex-shrink:0;max-height:220px;display:flex;flex-direction:column;">
          <div class="card-title">On Hold</div>
          <div id="hold-list" style="overflow-y:auto;flex:1;">
            <div class="hold-empty">No bugs on hold</div>
          </div>
        </div>

        <!-- Commit Prompt (inline, collapsible) -->
        <details class="card commit-collapsible" id="commit-inline-section">
          <summary class="commit-summary-toggle">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
            Commit Prompt
            <span class="commit-toggle-hint">click to expand</span>
          </summary>
          <div class="commit-form-body" id="commit-form-inline"></div>
        </details>
      </div>

      <!-- ── Panel: All Bugs ── -->
      <div class="panel" id="panel-bugs">
        <div class="bugs-toolbar">
          <span class="section-title" style="margin:0;">All Bugs</span>
          <div class="spacer"></div>
          <span style="font-size:11px;color:var(--text-muted);">Columns:</span>
          <div class="col-toggles" id="col-toggles"></div>
        </div>
        <div class="sub-tabs" id="sub-tabs">
          <button class="sub-tab active" data-tab="to_work">To Work <span class="count" id="count-to_work">0</span></button>
          <button class="sub-tab" data-tab="assigned">Assigned <span class="count" id="count-assigned">0</span></button>
          <button class="sub-tab" data-tab="review">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            Review <span class="count" id="count-review">0</span>
          </button>
          <button class="sub-tab" data-tab="reopened">Reopened <span class="count" id="count-reopened">0</span></button>
          <button class="sub-tab" data-tab="resolved_fixed">Resolved Fixed <span class="count" id="count-resolved_fixed">0</span></button>
          <button class="sub-tab" data-tab="resolved_implemented">Resolved Implemented <span class="count" id="count-resolved_implemented">0</span></button>
          <button class="sub-tab" data-tab="all">All Bugs <span class="count" id="count-all">0</span></button>
        </div>
        <div class="table-wrap">
          <table class="bug-table" id="bug-table">
            <thead id="bug-table-head"></thead>
            <tbody id="bug-table-body"></tbody>
          </table>
        </div>
      </div>

      <!-- ── Panel: Commit Prompt ── -->
      <div class="panel" id="panel-commit">
        <div class="top-row" style="flex-shrink:0;">
          <span class="section-title">Commit Prompt</span>
          <div class="spacer"></div>
          <button class="btn btn-outline btn-sm" id="btn-fill-from-bug">↺ Fill from current bug</button>
        </div>
        <div class="commit-tab-scroll">
          <div class="commit-form-body" id="commit-form-tab"></div>
        </div>
      </div>

      <!-- ── Panel: Logs ── -->
      <div class="panel" id="panel-logs">
        <div class="top-row" style="flex-shrink:0;">
          <span class="section-title">Logs</span>
          <div class="spacer"></div>
          <button class="btn btn-outline btn-sm" id="btn-clear-logs">Clear</button>
        </div>
        <div id="logs-section" style="overflow:auto;flex:1;padding:8px;white-space:pre-wrap;font-family:monospace;"></div>
      </div>

    </div><!-- /panels -->
  </div><!-- /main -->

</div><!-- /app -->

<!-- Settings Modal -->
<div id="settings-overlay">
  <div id="settings-modal">
    <div class="modal-title">Settings</div>
    <div class="form-group">
      <label class="form-label" for="input-url">Bugzilla URL</label>
      <input class="form-input" id="input-url" type="url" placeholder="https://vmbugzilla.altus.com.br/demandas">
    </div>
    <div class="form-group">
      <label class="form-label" for="input-email">User Email</label>
      <input class="form-input" id="input-email" type="email" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label class="form-label" for="input-apikey">API Key</label>
      <input class="form-input" id="input-apikey" type="password" placeholder="Leave unchanged to keep current key">
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" id="btn-cancel-settings">Cancel</button>
      <button class="btn btn-primary" id="btn-save-settings">Save &amp; Refresh</button>
    </div>
  </div>
</div>

<!-- Add Bug Dialog -->
<div id="bug-id-overlay">
  <div id="bug-id-modal">
    <div class="modal-title">Set Current Bug</div>
    <div class="form-group">
      <label class="form-label">Select from your bugs</label>
      <input class="form-input" id="bug-picker-search" type="text" placeholder="Search bugs…" autocomplete="off">
      <div id="bug-picker-list" class="bug-picker-list"></div>
    </div>
    <div class="form-group" style="border-top:1px solid var(--border);padding-top:12px;">
      <label class="form-label" for="input-bug-id">Or enter Bug ID manually</label>
      <input class="form-input" id="input-bug-id" type="number" placeholder="e.g. 12345" min="1">
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" id="btn-cancel-bug-id">Cancel</button>
      <button class="btn btn-primary" id="btn-confirm-bug-id">Set Bug</button>
    </div>
  </div>
</div>

<!-- Manage Dropdown Modal (branches / repos) -->
<div id="manage-dropdown-overlay">
  <div id="manage-dropdown-modal">
    <div class="modal-title" id="manage-dropdown-title">Manage</div>
    <div id="manage-dropdown-list" class="manage-list"></div>
    <div class="form-group" style="margin-top:12px;display:flex;gap:8px;">
      <input class="form-input" id="manage-dropdown-input" placeholder="New value…" style="flex:1;">
      <input class="form-input" id="manage-dropdown-default" placeholder="(optional) set as default?" style="display:none;">
    </div>
    <div class="manage-hint" id="manage-default-hint"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" id="btn-manage-done">Done</button>
      <button class="btn btn-primary" id="btn-manage-add">Add</button>
    </div>
  </div>
</div>

<!-- Shared file history datalist -->
<datalist id="file-history-datalist"></datalist>

<!-- Toast container -->
<div id="toast-container"></div>

<!-- Application entry point -->
<script type="module" src="js/app.js"></script>
</body>
</html>
