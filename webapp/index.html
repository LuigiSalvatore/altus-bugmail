<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bugzilla Tracker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- Header -->
  <header>
    <div class="header-brand">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
      Bugzilla Tracker
    </div>
    <div class="header-actions">
      <button class="btn btn-outline btn-sm" id="btn-refresh">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
        Refresh
      </button>
      <button class="btn btn-ghost btn-icon" id="btn-settings" title="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
      </button>
    </div>
  </header>

  <!-- Status Bar -->
  <div id="status-bar">
    <div id="status-dot"></div>
    <span id="status-text">Connecting…</span>
    <div class="spacer"></div>
    <span id="status-refresh">Next refresh in <span id="countdown">60</span>s</span>
  </div>

  <!-- Main -->
  <div id="main">
    <!-- Left nav -->
    <nav id="tab-nav">
      <button class="tab-btn active" data-panel="current">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Current Bug
      </button>
      <button class="tab-btn" data-panel="bugs">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
        All Bugs
      </button>
      <button class="tab-btn" data-panel="commit">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        Commit Prompt
      </button>
    </nav>

    <div id="panels">

      <!-- ── Panel: Current Bug ── -->
      <div class="panel active" id="panel-current">
        <div class="top-row">
          <span class="section-title">Current Bug</span>
          <div class="spacer"></div>
          <button class="btn btn-primary btn-sm" id="btn-add-bug">+ Add Bug</button>
          <button class="btn btn-success btn-sm" id="btn-complete">✓ Complete</button>
          <button class="btn btn-outline btn-sm" id="btn-hold">⏸ Put On Hold</button>
        </div>

        <!-- Current bug card -->
        <div class="card" id="current-bug-card" style="flex:1;overflow:hidden;display:flex;flex-direction:column;">
          <div id="current-bug-empty">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>
            <span>No bug currently being worked on</span>
            <button class="btn btn-primary btn-sm" onclick="openAddBugDialog()">+ Add Current Bug</button>
          </div>
          <div id="current-bug-details" style="display:none;flex-direction:column;flex:1;overflow:hidden;">
            <div id="current-bug-header">
              <div>
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
                  <span id="current-bug-id"></span>
                  <span id="current-bug-status-badge" class="badge"></span>
                </div>
                <div id="current-bug-summary"></div>
              </div>
              <a id="current-bug-link" href="#" target="_blank" class="btn btn-outline btn-sm" title="Open in Bugzilla">↗ Open</a>
            </div>
            <div class="bug-meta-grid" id="current-bug-meta"></div>
            <div id="current-bug-body">
              <div class="bug-section-label">Description</div>
              <div class="bug-description" id="current-bug-desc"></div>
              <div class="bug-section-label" id="comments-label" style="display:none;">Comments</div>
              <div id="current-bug-comments"></div>
            </div>
          </div>
        </div>

        <!-- On Hold -->
        <div class="card" id="hold-panel" style="flex-shrink:0;max-height:220px;display:flex;flex-direction:column;">
          <div class="card-title">On Hold</div>
          <div id="hold-list" style="overflow-y:auto;flex:1;">
            <div class="hold-empty">No bugs on hold</div>
          </div>
        </div>

        <!-- ── Commit Prompt (inline, collapsible) ── -->
        <details class="card commit-collapsible" id="commit-inline-section">
          <summary class="commit-summary-toggle">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
            Commit Prompt
            <span class="commit-toggle-hint">click to expand</span>
          </summary>
          <div class="commit-form-body" id="commit-form-inline"></div>
        </details>
      </div>

      <!-- ── Panel: All Bugs ── -->
      <div class="panel" id="panel-bugs">
        <div class="bugs-toolbar">
          <span class="section-title" style="margin:0;">All Bugs</span>
          <div class="spacer"></div>
          <span style="font-size:11px;color:var(--text-muted);">Columns:</span>
          <div class="col-toggles" id="col-toggles"></div>
        </div>
        <div class="sub-tabs" id="sub-tabs">
          <button class="sub-tab active" data-tab="assigned">Assigned <span class="count" id="count-assigned">0</span></button>
          <button class="sub-tab" data-tab="resolved_fixed">Resolved Fixed <span class="count" id="count-resolved_fixed">0</span></button>
          <button class="sub-tab" data-tab="resolved_implemented">Resolved Implemented <span class="count" id="count-resolved_implemented">0</span></button>
          <button class="sub-tab" data-tab="all">All Bugs <span class="count" id="count-all">0</span></button>
        </div>
        <div class="table-wrap">
          <table class="bug-table" id="bug-table">
            <thead id="bug-table-head"></thead>
            <tbody id="bug-table-body"></tbody>
          </table>
        </div>
      </div>

      <!-- ── Panel: Commit Prompt ── -->
      <div class="panel" id="panel-commit">
        <div class="top-row" style="flex-shrink:0;">
          <span class="section-title">Commit Prompt</span>
          <div class="spacer"></div>
          <button class="btn btn-outline btn-sm" onclick="autoFillBug()">↺ Fill from current bug</button>
        </div>
        <div class="commit-tab-scroll">
          <div class="commit-form-body" id="commit-form-tab"></div>
        </div>
      </div>

    </div><!-- /panels -->
  </div><!-- /main -->

</div><!-- /app -->

<!-- Settings Modal -->
<div id="settings-overlay">
  <div id="settings-modal">
    <div class="modal-title">Settings</div>
    <div class="form-group">
      <label class="form-label" for="input-url">Bugzilla URL</label>
      <input class="form-input" id="input-url" type="url" placeholder="https://vmbugzilla.altus.com.br/demandas">
    </div>
    <div class="form-group">
      <label class="form-label" for="input-email">User Email</label>
      <input class="form-input" id="input-email" type="email" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label class="form-label" for="input-apikey">API Key</label>
      <input class="form-input" id="input-apikey" type="password" placeholder="Leave unchanged to keep current key">
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeSettings()">Cancel</button>
      <button class="btn btn-primary" id="btn-save-settings">Save &amp; Refresh</button>
    </div>
  </div>
</div>

<!-- Add Bug Dialog -->
<div id="bug-id-overlay">
  <div id="bug-id-modal">
    <div class="modal-title">Set Current Bug</div>
    <div class="form-group">
      <label class="form-label" for="input-bug-id">Bug ID</label>
      <input class="form-input" id="input-bug-id" type="number" placeholder="e.g. 12345" min="1">
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeBugIdDialog()">Cancel</button>
      <button class="btn btn-primary" id="btn-confirm-bug-id">Set Bug</button>
    </div>
  </div>
</div>

<!-- Manage Dropdown Modal (branches / repos) -->
<div id="manage-dropdown-overlay" onclick="if(event.target===this)closeManageDropdown()">
  <div id="manage-dropdown-modal">
    <div class="modal-title" id="manage-dropdown-title">Manage</div>
    <div id="manage-dropdown-list" class="manage-list"></div>
    <div class="form-group" style="margin-top:12px;display:flex;gap:8px;">
      <input class="form-input" id="manage-dropdown-input" placeholder="New value…" style="flex:1;">
      <input class="form-input" id="manage-dropdown-default" placeholder="(optional) set as default?" style="display:none;">
    </div>
    <div class="manage-hint" id="manage-default-hint"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeManageDropdown()">Done</button>
      <button class="btn btn-primary" onclick="addManageDropdownItem()">Add</button>
    </div>
  </div>
</div>

<!-- Shared file history datalist -->
<datalist id="file-history-datalist"></datalist>

<!-- Toast container -->
<div id="toast-container"></div>

<script>
// ─── State ───────────────────────────────────────────────────
const state = {
  data: null,
  config: null,
  activeTab: 'assigned',
  sortCol: null,
  sortDir: 1,
  countdown: 60,
  visibleCols: { Priority: true, Assignee: true, Product: false, Activity: false, 'Sub-Activity': false, Importance: false, Version: false }
};

const ALL_COLS = ['Priority','Assignee','Product','Activity','Sub-Activity','Importance','Version'];
const TAB_KEYS = { assigned: 'assigned_bugs', resolved_fixed: 'resolved_fixed_bugs', resolved_implemented: 'resolved_implemented_bugs', all: 'all_bugs' };
const COL_FIELD = { ID:'id', Summary:'summary', Status:'status', Priority:'priority', Assignee:'assigned_to', Product:'product', Activity:'activity', 'Sub-Activity':'sub_activity', Importance:'importance', Version:'version' };

// ─── API helpers ──────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  const json = await r.json();
  if (!r.ok) throw new Error(json.error || r.statusText);
  return json;
}

// ─── Toast ───────────────────────────────────────────────────
function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<div class="toast-dot"></div><span>${msg}</span>`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ─── Status bar ───────────────────────────────────────────────
function setStatus(state_, text) {
  document.getElementById('status-dot').className = state_;
  document.getElementById('status-text').textContent = text;
}

// ─── Countdown ───────────────────────────────────────────────
function startCountdown() {
  clearInterval(window._cdTimer);
  state.countdown = 60;
  document.getElementById('countdown').textContent = 60;
  window._cdTimer = setInterval(() => {
    state.countdown--;
    document.getElementById('countdown').textContent = state.countdown;
    if (state.countdown <= 0) { state.countdown = 60; doRefresh(); }
  }, 1000);
}

// ─── Config ───────────────────────────────────────────────────
async function loadConfig() {
  state.config = await api('GET', '/api/config');
  if (state.config.view_settings) state.visibleCols = { ...state.visibleCols, ...state.config.view_settings };
  renderColToggles();
}

function openSettings() {
  document.getElementById('input-url').value = state.config?.bugzilla_url || '';
  document.getElementById('input-email').value = state.config?.user_email || '';
  document.getElementById('input-apikey').value = '';
  document.getElementById('settings-overlay').classList.add('open');
}

function closeSettings() {
  document.getElementById('settings-overlay').classList.remove('open');
}

document.getElementById('btn-save-settings').addEventListener('click', async () => {
  const body = {
    bugzilla_url: document.getElementById('input-url').value.trim(),
    user_email: document.getElementById('input-email').value.trim(),
    view_settings: state.visibleCols
  };
  const key = document.getElementById('input-apikey').value.trim();
  if (key) body.api_key = key;
  try {
    await api('POST', '/api/config', body);
    state.config = { ...state.config, ...body };
    closeSettings();
    toast('Settings saved', 'success');
    doRefresh();
  } catch(e) { toast(e.message, 'error'); }
});

// ─── Refresh ─────────────────────────────────────────────────
async function doRefresh() {
  setStatus('loading', 'Refreshing…');
  try {
    state.data = await api('POST', '/api/refresh');
    setStatus('active', 'Up to date');
    renderAll();
    startCountdown();
    toast('Bugs refreshed', 'success');
  } catch(e) {
    setStatus('error', 'Refresh failed');
    toast(e.message, 'error');
    // Still try to load cached data
    try { state.data = await api('GET', '/api/data'); renderAll(); } catch(_) {}
  }
}

async function loadData() {
  state.data = await api('GET', '/api/data');
  if (state.data) { setStatus('active', 'Loaded from cache'); renderAll(); }
}

// ─── Render ───────────────────────────────────────────────────
function purgeNonAssignedPrios() {
  const assigned = state.data?.assigned_bugs || [];
  const assignedIds = new Set(assigned.map(b => String(b.id)));
  let prios    = getLocalPrios();
  let subPrios = getLocalSubPrios();
  let changed  = false;
  Object.keys(prios).forEach(id => {
    if (!assignedIds.has(id)) { delete prios[id]; changed = true; }
  });
  Object.keys(subPrios).forEach(id => {
    if (!assignedIds.has(id)) { delete subPrios[id]; changed = true; }
  });
  if (changed) {
    localStorage.setItem(LS_PRIO,     JSON.stringify(prios));
    localStorage.setItem(LS_SUB_PRIO, JSON.stringify(subPrios));
  }
}

function autoAssignSubPrios() {
  const assigned = state.data?.assigned_bugs || [];
  if (!assigned.length) return;
  const subPrios = getLocalSubPrios();
  // Separate bugs that already have a rank from new ones
  const ranked   = assigned.filter(b => subPrios[String(b.id)] !== undefined && subPrios[String(b.id)] !== null);
  const unranked = assigned.filter(b => subPrios[String(b.id)] === undefined  || subPrios[String(b.id)] === null);
  if (!unranked.length) return;
  const maxRank  = ranked.length ? Math.max(...ranked.map(b => subPrios[String(b.id)])) : 0;
  unranked.forEach((b, i) => { subPrios[String(b.id)] = maxRank + i + 1; });
  localStorage.setItem(LS_SUB_PRIO, JSON.stringify(subPrios));
}

function normaliseSubPrios() {
  // Compact ranks to 1..N with no gaps, preserving relative order
  const subPrios = getLocalSubPrios();
  const entries  = Object.entries(subPrios).sort((a,b) => a[1]-b[1]);
  entries.forEach(([id], i) => { subPrios[id] = i + 1; });
  localStorage.setItem(LS_SUB_PRIO, JSON.stringify(subPrios));
}

function renderAll() {
  purgeNonAssignedPrios();
  autoAssignSubPrios();
  normaliseSubPrios();
  renderCurrentBug();
  renderHoldList();
  renderBugTable();
  renderCounts();
}

function statusBadgeClass(s) {
  if (!s) return 'badge-default';
  s = s.toUpperCase();
  if (s === 'ASSIGNED') return 'badge-assigned';
  if (s === 'RESOLVED') return 'badge-resolved';
  if (s === 'NEW' || s === 'UNCONFIRMED') return 'badge-new';
  return 'badge-default';
}

function renderCurrentBug() {
  const bug = state.data?.current_bug;
  const empty = document.getElementById('current-bug-empty');
  const details = document.getElementById('current-bug-details');
  if (!bug) { empty.style.display = 'flex'; details.style.display = 'none'; return; }
  empty.style.display = 'none';
  details.style.display = 'flex';

  document.getElementById('current-bug-id').textContent = `#${bug.id}`;
  document.getElementById('current-bug-id').className = 'badge badge-assigned';

  const sb = document.getElementById('current-bug-status-badge');
  sb.textContent = bug.status || '';
  sb.className = `badge ${statusBadgeClass(bug.status)}`;

  document.getElementById('current-bug-summary').innerHTML = `<div id="current-bug-summary" style="font-size:16px;font-weight:600;color:var(--text-primary);letter-spacing:-0.01em;margin-bottom:12px;line-height:1.4;">${esc(bug.summary || '')}</div>`;

  const baseUrl = (state.config?.bugzilla_url || '').replace(/\/+$/, '');
  document.getElementById('current-bug-link').href = `${baseUrl}/show_bug.cgi?id=${bug.id}`;

  const meta = [
    ['Priority', bug.priority], ['Severity', bug.severity], ['Assignee', bug.assigned_to],
    ['Product', bug.product], ['Activity', bug.activity], ['Sub-Activity', bug.sub_activity],
    ['Importance', bug.importance], ['Version', bug.version]
  ];
  document.getElementById('current-bug-meta').innerHTML = meta.map(([l,v]) => v ? `
    <div class="bug-meta-item">
      <div class="bug-meta-label">${l}</div>
      <div class="bug-meta-value">${esc(v)}</div>
    </div>` : '').join('');

  document.getElementById('current-bug-desc').textContent = bug.description || 'No description.';

  const comments = bug.comments || [];
  const cl = document.getElementById('comments-label');
  cl.style.display = comments.length ? '' : 'none';
  document.getElementById('current-bug-comments').innerHTML = comments.map(c => `
    <div class="comment-item">
      <div class="comment-meta">
        <span class="comment-author">${esc(c.author||'')}</span>
        <span>${esc(c.creation_time||'')}</span>
      </div>
      <div class="comment-text">${esc(c.text||'')}</div>
    </div>`).join('');
}

function renderHoldList() {
  const list = document.getElementById('hold-list');
  const bugs = state.data?.on_hold_bugs || [];
  if (!bugs.length) { list.innerHTML = '<div class="hold-empty">No bugs on hold</div>'; return; }
  list.innerHTML = bugs.map((b,i) => `
    <div class="hold-item">
      <div class="hold-item-info">
        <div class="hold-item-id">#${b.id}</div>
        <div class="hold-item-summary">${esc(b.summary||'')}</div>
      </div>
      <button class="btn btn-outline btn-sm" onclick="removeFromHold(${i})">Make Current</button>
    </div>`).join('');
}

function getActiveColumns() {
  const base = ['ID','Summary','Status'];
  return base.concat(ALL_COLS.filter(c => state.visibleCols[c]));
}

// ─── Local Bug Priority ───────────────────────────────────────
const LS_PRIO = 'bz_local_prio';
const LS_SUB_PRIO = 'bz_local_sub_prio';
const PRIO_CYCLE  = [null, 'high', 'medium', 'low'];
const PRIO_LABEL  = { high: '🔴 High', medium: '🟡 Medium', low: '🟢 Low' };
const PRIO_ORDER  = { high: 0, medium: 1, low: 2 };

function getLocalPrios() {
  try { return JSON.parse(localStorage.getItem(LS_PRIO)) || {}; } catch(e) { return {}; }
}
function setLocalPrio(bugId, prio) {
  const p = getLocalPrios();
  if (prio === null) delete p[String(bugId)]; else p[String(bugId)] = prio;
  localStorage.setItem(LS_PRIO, JSON.stringify(p));
}
function cycleLocalPrio(bugId) {
  const p = getLocalPrios();
  const cur = p[String(bugId)] || null;
  const next = PRIO_CYCLE[(PRIO_CYCLE.indexOf(cur) + 1) % PRIO_CYCLE.length];
  setLocalPrio(bugId, next);
  renderBugTable();
}
function getLocalSubPrios() {
  try { return JSON.parse(localStorage.getItem(LS_SUB_PRIO)) || {}; } catch(e) { return {}; }
}
function setLocalSubPrio(bugId, val) {
  const p = getLocalSubPrios();
  if (val === null) delete p[String(bugId)]; else p[String(bugId)] = val;
  localStorage.setItem(LS_SUB_PRIO, JSON.stringify(p));
}
function moveSubPrio(bugId, dir) {
  // dir: -1 = move up (lower number), +1 = move down (higher number)
  const subPrios  = getLocalSubPrios();
  const myRank    = subPrios[String(bugId)];
  if (myRank === undefined) return;
  const targetRank = myRank + dir;
  const swapId     = Object.keys(subPrios).find(id => subPrios[id] === targetRank);
  if (!swapId) return; // already at boundary
  subPrios[String(bugId)] = targetRank;
  subPrios[swapId]        = myRank;
  localStorage.setItem(LS_SUB_PRIO, JSON.stringify(subPrios));
  renderBugTable();
}
function prioBadgeHTML(bugId, isAssigned) {
  const p  = getLocalPrios()[String(bugId)];
  const b1 = !p ? `<span class="lp-badge lp-none" onclick="event.stopPropagation();cycleLocalPrio(${bugId})" title="Click to set priority">—</span>`
                : `<span class="lp-badge lp-${p}" onclick="event.stopPropagation();cycleLocalPrio(${bugId})" title="Click to change priority">${PRIO_LABEL[p]}</span>`;
  if (!isAssigned) return `<div class="lp-cell-wrap">${b1}</div>`;
  const sp      = getLocalSubPrios()[String(bugId)] ?? '?';
  const total   = (state.data?.assigned_bugs||[]).length;
  const atTop   = sp === 1;
  const atBot   = sp === total;
  const b2 = `<div class="sp-rank" onclick="event.stopPropagation()">
    <button class="sp-arrow${atTop?' sp-arrow-disabled':''}" onclick="moveSubPrio(${bugId},-1)" title="Move up" ${atTop?'disabled':''}>▲</button>
    <span class="lp-sub-badge lp-num">${sp}</span>
    <button class="sp-arrow${atBot?' sp-arrow-disabled':''}" onclick="moveSubPrio(${bugId},1)" title="Move down" ${atBot?'disabled':''}>▼</button>
  </div>`;
  return `<div class="lp-cell-wrap">${b1}${b2}</div>`;
}
function prioSortVal(bugId) {
  const p = getLocalPrios()[String(bugId)];
  return p ? PRIO_ORDER[p] : 99;
}
function subPrioSortVal(bugId) {
  const sp = getLocalSubPrios()[String(bugId)];
  return (sp !== undefined && sp !== null) ? sp : 999999;
}

function renderBugTable() {
  const cols = getActiveColumns();
  const bugs = state.data?.[TAB_KEYS[state.activeTab]] || [];

  // Sort: assigned tab always sorts by local priority first
  let sorted = [...bugs];
  const isAssigned = state.activeTab === 'assigned';
  if (state.sortCol) {
    const field = COL_FIELD[state.sortCol] || state.sortCol.toLowerCase();
    sorted.sort((a,b) => {
      if (isAssigned) {
        const pd = prioSortVal(a.id) - prioSortVal(b.id);
        if (pd !== 0) return pd;
        const spd = subPrioSortVal(a.id) - subPrioSortVal(b.id);
        if (spd !== 0) return spd;
      }
      const av = String(a[field]||''), bv = String(b[field]||'');
      return av.localeCompare(bv) * state.sortDir;
    });
  } else if (isAssigned) {
    sorted.sort((a,b) => {
      const pd = prioSortVal(a.id) - prioSortVal(b.id);
      if (pd !== 0) return pd;
      return subPrioSortVal(a.id) - subPrioSortVal(b.id);
    });
  }

  // Head — ★ column always first
  const thead = document.getElementById('bug-table-head');
  const pHead = `<th class="lp-th" title="My Priority (click cells to set)">★ Prio</th>`;
  thead.innerHTML = `<tr>${pHead}${cols.map(c => {
    const cls = state.sortCol === c ? (state.sortDir === 1 ? 'sort-asc' : 'sort-desc') : '';
    return `<th class="${cls}" data-col="${c}">${c}</th>`;
  }).join('')}</tr>`;
  thead.querySelectorAll('th[data-col]').forEach(th => th.addEventListener('click', () => {
    if (state.sortCol === th.dataset.col) state.sortDir *= -1;
    else { state.sortCol = th.dataset.col; state.sortDir = 1; }
    renderBugTable();
  }));

  // Body
  const baseUrl = (state.config?.bugzilla_url || '').replace(/\/+$/, '');
  document.getElementById('bug-table-body').innerHTML = sorted.map(bug => `
    <tr data-id="${bug.id}" data-url="${baseUrl}/show_bug.cgi?id=${bug.id}">
      <td class="lp-cell">${prioBadgeHTML(bug.id, isAssigned)}</td>
      ${cols.map(c => {
        if (c === 'ID') return `<td>${bug.id}</td>`;
        if (c === 'Summary') return `<td class="col-summary"><div class="cell-truncate">${esc(bug.summary||'')}</div></td>`;
        if (c === 'Status') return `<td><span class="badge ${statusBadgeClass(bug.status)}">${esc(bug.status||'')}</span></td>`;
        const field = COL_FIELD[c] || c.toLowerCase();
        return `<td><div class="cell-truncate">${esc(bug[field]||'')}</div></td>`;
      }).join('')}
    </tr>`).join('');

  document.querySelectorAll('#bug-table-body tr').forEach(tr => {
    tr.addEventListener('dblclick', () => window.open(tr.dataset.url, '_blank'));
    tr.addEventListener('keydown', e => { if (e.key === 'Enter') window.open(tr.dataset.url, '_blank'); });
    tr.setAttribute('tabindex', '0');
  });
}

function renderCounts() {
  if (!state.data) return;
  document.getElementById('count-assigned').textContent = (state.data.assigned_bugs||[]).length;
  document.getElementById('count-resolved_fixed').textContent = (state.data.resolved_fixed_bugs||[]).length;
  document.getElementById('count-resolved_implemented').textContent = (state.data.resolved_implemented_bugs||[]).length;
  document.getElementById('count-all').textContent = (state.data.all_bugs||[]).length;
}

function renderColToggles() {
  const c = document.getElementById('col-toggles');
  c.innerHTML = ALL_COLS.map(col => `
    <button class="col-toggle ${state.visibleCols[col] ? 'on' : ''}" data-col="${col}">${col}</button>
  `).join('');
  c.querySelectorAll('.col-toggle').forEach(btn => btn.addEventListener('click', () => {
    const col = btn.dataset.col;
    state.visibleCols[col] = !state.visibleCols[col];
    btn.classList.toggle('on', state.visibleCols[col]);
    renderBugTable();
    api('POST', '/api/config', { view_settings: state.visibleCols });
  }));
}

// ─── Actions ─────────────────────────────────────────────────
function openAddBugDialog() {
  document.getElementById('input-bug-id').value = '';
  document.getElementById('bug-id-overlay').classList.add('open');
  setTimeout(() => document.getElementById('input-bug-id').focus(), 50);
}

function closeBugIdDialog() {
  document.getElementById('bug-id-overlay').classList.remove('open');
}

document.getElementById('btn-confirm-bug-id').addEventListener('click', async () => {
  const id = document.getElementById('input-bug-id').value.trim();
  if (!id) return;
  closeBugIdDialog();
  setStatus('loading', `Fetching bug #${id}…`);
  try {
    const bug = await api('POST', '/api/current-bug', { bug_id: id });
    state.data = state.data || {};
    state.data.current_bug = bug;
    renderCurrentBug();
    setStatus('active', 'Up to date');
    toast(`Bug #${id} set as current`, 'success');
  } catch(e) { setStatus('error', e.message); toast(e.message, 'error'); }
});

document.getElementById('input-bug-id').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn-confirm-bug-id').click();
});

document.getElementById('btn-add-bug').addEventListener('click', openAddBugDialog);

document.getElementById('btn-complete').addEventListener('click', async () => {
  if (!state.data?.current_bug) { toast('No current bug', 'error'); return; }
  const completedId = state.data.current_bug.id;
  if (!confirm(`Complete bug #${completedId}?`)) return;
  try {
    // Shift sub-priorities: remove completed, decrement remaining by 1
    const subPrios = getLocalSubPrios();
    const completedSP = subPrios[String(completedId)];
    if (completedSP !== undefined && completedSP !== null) {
      delete subPrios[String(completedId)];
      // Decrement all bugs with sub-prio > completed's sub-prio
      Object.keys(subPrios).forEach(id => {
        if (subPrios[id] > completedSP) subPrios[id] -= 1;
      });
      localStorage.setItem(LS_SUB_PRIO, JSON.stringify(subPrios));
    }
    await api('DELETE', '/api/current-bug');
    state.data.current_bug = null;
    renderCurrentBug();
    renderBugTable();
    toast('Bug completed — sub-priorities updated', 'success');
  } catch(e) { toast(e.message, 'error'); }
});

document.getElementById('btn-hold').addEventListener('click', async () => {
  if (!state.data?.current_bug) { toast('No current bug to hold', 'error'); return; }
  try {
    await api('POST', '/api/hold');
    const bug = state.data.current_bug;
    state.data.on_hold_bugs = state.data.on_hold_bugs || [];
    state.data.on_hold_bugs.push(bug);
    state.data.current_bug = null;
    renderCurrentBug();
    renderHoldList();
    toast(`Bug #${bug.id} put on hold`, 'info');
  } catch(e) { toast(e.message, 'error'); }
});

async function removeFromHold(index) {
  if (state.data?.current_bug) {
    if (!confirm('Replace current bug with this one?')) return;
  }
  try {
    const bug = await api('DELETE', `/api/hold/${index}`);
    state.data.current_bug = bug;
    state.data.on_hold_bugs.splice(index, 1);
    renderCurrentBug();
    renderHoldList();
    toast(`Bug #${bug.id} is now current`, 'success');
  } catch(e) { toast(e.message, 'error'); }
}

// ─── Tab switching ───────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(`panel-${btn.dataset.panel}`).classList.add('active');
}));

document.querySelectorAll('.sub-tab').forEach(btn => btn.addEventListener('click', () => {
  document.querySelectorAll('.sub-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  state.activeTab = btn.dataset.tab;
  state.sortCol = null;
  renderBugTable();
}));

// ─── Header buttons ───────────────────────────────────────────
document.getElementById('btn-refresh').addEventListener('click', doRefresh);
document.getElementById('btn-settings').addEventListener('click', openSettings);

// Close modals on overlay click
document.getElementById('settings-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeSettings(); });
document.getElementById('bug-id-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeBugIdDialog(); });

// ─── Utils ───────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Init ─────────────────────────────────────────────────────
(async () => {
  try {
    await loadConfig();
    await loadData();
    renderColToggles();
    initCommitSystem();
    startCountdown();
    if (state.config?.api_key && !state.config.api_key.startsWith('••••')) {
      doRefresh();
    } else if (state.data?.last_update) {
      setStatus('active', `Cached: ${state.data.last_update.slice(0,16).replace('T',' ')}`);
    } else {
      setStatus('error', 'Not configured — open Settings');
      openSettings();
    }
  } catch(e) {
    setStatus('error', 'Failed to load');
    toast(e.message, 'error');
  }
})();

// ═══════════════════════════════════════════════════════
// COMMIT PROMPT SYSTEM
// ═══════════════════════════════════════════════════════

const LS_CS  = 'bz_commit_state';
const LS_BR  = 'bz_branches';
const LS_RE  = 'bz_repos';
const LS_FH  = 'bz_file_hist';
const DEF_BRANCH = 'v1.14.x.x/develop';
const DEF_REPO   = 'linux-multi-target';

let cs = { bugName:'', bugLink:'', bugDesc:'', files:[{file:'',desc:''}], repo:DEF_REPO, branch:DEF_BRANCH, hash:'', notes:'' };

function loadCS() {
  try { const s = localStorage.getItem(LS_CS); if (s) cs = {...cs, ...JSON.parse(s)}; } catch(e){}
  if (!cs.files?.length) cs.files = [{file:'',desc:''}];
}
function saveCS() { localStorage.setItem(LS_CS, JSON.stringify(cs)); }

function getBranchesKey(repo) { return `bz_branches_${(repo||'default').replace(/[^a-zA-Z0-9_]/g,'_')}`; }
function getBranches(repo)    { const k = getBranchesKey(repo||cs.repo); try { return JSON.parse(localStorage.getItem(k)) || [DEF_BRANCH]; } catch(e){ return [DEF_BRANCH]; } }
function saveBranches(a,repo) { localStorage.setItem(getBranchesKey(repo||cs.repo), JSON.stringify(a)); }
function getRepos()    { try { return JSON.parse(localStorage.getItem(LS_RE)) || [DEF_REPO]; } catch(e){ return [DEF_REPO]; } }
function saveRepos(a)  { localStorage.setItem(LS_RE, JSON.stringify(a)); }
function getDefBranch(repo){ return localStorage.getItem(`bz_def_branch_${(repo||cs.repo).replace(/[^a-zA-Z0-9_]/g,'_')}`) || DEF_BRANCH; }
function setDefBranch(v,repo){ localStorage.setItem(`bz_def_branch_${(repo||cs.repo).replace(/[^a-zA-Z0-9_]/g,'_')}`, v); }
function getDefRepo()  { return localStorage.getItem('bz_def_repo') || DEF_REPO; }
function setDefRepo(v) { localStorage.setItem('bz_def_repo', v); }
function getFileHist() { try { return JSON.parse(localStorage.getItem(LS_FH)) || []; } catch(e){ return []; } }
function addToFileHist(f) {
  if (!f.trim()) return;
  let h = getFileHist().filter(x => x !== f);
  h.unshift(f); if (h.length > 80) h = h.slice(0,80);
  localStorage.setItem(LS_FH, JSON.stringify(h));
}

function buildFormHTML(formId) {
  const bOpts = getBranches(cs.repo).map(b => `<option value="${esc(b)}"${b===cs.branch?' selected':''}>${esc(b)}</option>`).join('');
  const rOpts = getRepos().map(r => `<option value="${esc(r)}"${r===cs.repo?' selected':''}>${esc(r)}</option>`).join('');
  const rowsHTML = cs.files.map((f,i) => `
    <div class="file-row">
      <input type="text" class="form-input" list="file-history-datalist" value="${esc(f.file)}"
        placeholder="path/to/file.c" oninput="updateFileRow(${i},'file',this.value)">
      <input type="text" class="form-input" value="${esc(f.desc)}"
        placeholder="What changed in this file" oninput="updateFileRow(${i},'desc',this.value)">
      <button class="btn btn-ghost btn-icon btn-sm file-rm" onclick="removeFileRow(${i})"
        title="Remove" ${cs.files.length===1?'disabled':''}>✕</button>
    </div>`).join('');

  return `
    <div class="cg2">
      <div class="form-group">
        <label class="form-label">Bug Name <span class="auto-badge">auto</span></label>
        <input type="text" class="form-input" value="${esc(cs.bugName)}"
          placeholder="Bug XXXXX - Summary" oninput="updateCS('bugName',this.value)">
      </div>
      <div class="form-group">
        <label class="form-label">Bug Link</label>
        <input type="text" class="form-input" value="${esc(cs.bugLink)}"
          placeholder="https://…" oninput="updateCS('bugLink',this.value)">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Bug Description / Comments <span class="auto-badge">auto</span></label>
      <textarea class="form-input commit-ta" rows="5"
        placeholder="Comments from the bug…"
        oninput="updateCS('bugDesc',this.value)">${esc(cs.bugDesc)}</textarea>
    </div>
    <div class="form-group">
      <div class="fgh"><label class="form-label" style="margin:0">Files Changed</label>
        <button class="btn btn-outline btn-sm" onclick="addFileRow()">+ Add Row</button></div>
      <div class="file-rows-head"><span>File path</span><span>Description of change</span><span></span></div>
      <div id="file-rows-${formId}">${rowsHTML}</div>
    </div>
    <div class="cg2">
      <div class="form-group">
        <div class="fgh"><label class="form-label" style="margin:0">Repository</label>
          <button class="btn btn-ghost btn-sm" onclick="openManageDrop('repo')">✎ Manage</button></div>
        <select class="form-input" onchange="updateCS('repo',this.value);cs.branch=getDefBranch(this.value);saveCS();renderCommitForms()">${rOpts}</select>
      </div>
      <div class="form-group">
        <div class="fgh"><label class="form-label" style="margin:0">Branch</label>
          <button class="btn btn-ghost btn-sm" onclick="openManageDrop('branch')">✎ Manage</button></div>
        <select class="form-input" onchange="updateCS('branch',this.value)">${bOpts}</select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Commit Hash(es) <span style="color:var(--text-muted);font-weight:400">(fill after committing)</span></label>
      <input type="text" class="form-input" value="${esc(cs.hash||'')}"
        placeholder="e.g. a1b2c3d  or  a1b2c3d e4f5a6b" oninput="updateCS('hash',this.value)">
    </div>
    <div class="form-group">
      <label class="form-label">Notes <span style="color:var(--text-muted);font-weight:400">(optional)</span></label>
      <textarea class="form-input commit-ta" rows="2"
        placeholder="Additional notes…"
        oninput="updateCS('notes',this.value)">${esc(cs.notes)}</textarea>
    </div>
    <div class="form-group">
      <div class="fgh" style="flex-wrap:wrap;gap:8px;">
        <label class="form-label" style="margin:0">Generated Prompt</label>
        <div style="display:flex;gap:6px;">
          <button class="btn btn-outline btn-sm" onclick="copyPrompt()">📋 Copy Prompt</button>
          <button class="btn btn-primary btn-sm" onclick="copyAndGPT()">🤖 Copy &amp; Go to GPT</button>
        </div>
      </div>
      <pre class="commit-out" id="prompt-out-${formId}"></pre>
    </div>`;
}

function renderCommitForms() {
  const i = document.getElementById('commit-form-inline');
  const t = document.getElementById('commit-form-tab');
  if (i) i.innerHTML = buildFormHTML('inline');
  if (t) t.innerHTML = buildFormHTML('tab');
  // update datalist
  const dl = document.getElementById('file-history-datalist');
  if (dl) dl.innerHTML = getFileHist().map(f=>`<option value="${esc(f)}">`).join('');
  updatePromptOutputs();
}

function updateCS(field, value) { cs[field]=value; saveCS(); updatePromptOutputs(); }

function updateFileRow(idx, prop, value) {
  if (!cs.files[idx]) return;
  cs.files[idx][prop] = value;
  if (prop==='file' && value.trim()) addToFileHist(value.trim());
  saveCS(); updatePromptOutputs();
}

function addFileRow()         { cs.files.push({file:'',desc:''}); saveCS(); renderCommitForms(); }
function removeFileRow(idx)   { if (cs.files.length<=1) return; cs.files.splice(idx,1); saveCS(); renderCommitForms(); }

function updatePromptOutputs() {
  const p = buildPrompt();
  document.querySelectorAll('.commit-out').forEach(el => el.textContent = p);
}

function buildPrompt() {
  const files   = cs.files.filter(f=>f.file||f.desc);
  const filesStr   = files.length ? files.map(f=>`- ${f.file}`).join('\n') : '{PLACEHOLDER}';
  const changesStr = files.length ? files.map(f=>`- [${f.file}] ${f.desc}`).join('\n') : '{PLACEHOLDER}';
  const sep = '-----------------------------------------------------------------------';
  return `TASK:
Generate commit messages FIRST.
Generate Bugzilla message ONLY after hashes are provided.

Language: English only
Be precise and deterministic.

--------------------------------
PHASE 1 — COMMIT MESSAGES

Generate one or more commit messages.

FORMAT (STRICT):

<type>: <description>

<body>

Files:
- <file1>
- <file2>

Refs: <name>

RULES:
- type: choose ONE (feat | fix | refactor | build | style | chore | docs | test | ci | sync | merge | revert)
- description: lowercase, imperative, no final period
- body: explain WHAT, WHY, HOW (paragraphs with blank lines)
- files: concise list
- always include Refs

Split commits if multiple logical changes exist.

OUTPUT:

[Commit Message 1]
<text>

[Commit Message 2] (if needed)
<text>

DO NOT generate Bugzilla message in this phase.

--------------------------------
PHASE 2 — BUGZILLA MESSAGE (ONLY AFTER HASHES PROVIDED)

When hashes are given, generate Bugzilla message.

STRUCTURE:

1. Issue summary
2. Root cause
3. Implemented solution

Then append ONE block per commit:

${sep}
							Git Tracking
${sep}
Repository:	${cs.repo||'{PLACEHOLDER}'}
Branch:		${cs.branch||'{PLACEHOLDER}'}
Hash:		${cs.hash||'{provided later}'}
${sep}
<ordinal> change

Repeat for each commit (1st change, 2nd change, ...)

Finish with:
Changed to RESOLVED IMPLEMENTED.

OUTPUT:

[Bugzilla Message]
<text>

--------------------------------
INPUT DATA

Bug name: ${cs.bugName||'{PLACEHOLDER}'}
Bug link: ${cs.bugLink||'{PLACEHOLDER}'}
Bug description: ${cs.bugDesc||'{PLACEHOLDER}'}
Changes made:
${changesStr}
Files changed:
${filesStr}
Repository: ${cs.repo||'{PLACEHOLDER}'}
Branch: ${cs.branch||'{PLACEHOLDER}'}
Hashes: ${cs.hash||'{provided later}'}
Notes: ${cs.notes||'(none)'}`;
}

function autoFillBug() {
  const bug = state.data?.current_bug;
  if (!bug) { toast('No current bug loaded','error'); return; }
  cs.bugName = `Bug ${bug.id} - ${bug.summary||''}`;
  const comments = bug.comments||[];
  cs.bugDesc = comments.length
    ? comments.map(c=>`--- ${c.author||'?'} (${(c.creation_time||'').slice(0,10)}) ---\n${(c.text||'').trim()}`).join('\n\n')
    : (bug.description||'');
  const base = (state.config?.bugzilla_url||'').replace(/\/+$/,'');
  cs.bugLink = `${base}/show_bug.cgi?id=${bug.id}`;
  saveCS(); renderCommitForms();
  toast(`Filled from Bug #${bug.id}`,'success');
}

async function copyPrompt() {
  try { await navigator.clipboard.writeText(buildPrompt()); toast('Copied!','success'); }
  catch(e){ toast('Copy failed','error'); }
}
async function copyAndGPT() {
  try { await navigator.clipboard.writeText(buildPrompt()); } catch(e){}
  window.open('https://chatgpt.com','_blank');
  toast('Copied — opening ChatGPT','success');
}

// ─── Manage dropdown modal ────────────────────────────────
let _mType = 'branch';
function openManageDrop(type) {
  _mType = type;
  document.getElementById('manage-dropdown-title').textContent = type==='branch'?'Manage Branches':'Manage Repositories';
  document.getElementById('manage-dropdown-input').value='';
  document.getElementById('manage-dropdown-input').placeholder = type==='branch'?'e.g. v1.15.x.x/develop':'e.g. linux-arm';
  renderManageList();
  document.getElementById('manage-dropdown-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('manage-dropdown-input').focus(),60);
}
function closeManageDropdown() {
  document.getElementById('manage-dropdown-overlay').classList.remove('open');
  renderCommitForms();
}
function renderManageList() {
  const items = _mType==='branch'?getBranches(cs.repo):getRepos();
  const def   = _mType==='branch'?getDefBranch(cs.repo):getDefRepo();
  document.getElementById('manage-dropdown-list').innerHTML = items.length
    ? items.map((v,i)=>`
      <div class="manage-item">
        <span class="manage-item-label">${esc(v)}</span>
        <div class="manage-item-actions">
          ${v===def?'<span class="default-badge">default</span>':`<button class="btn btn-ghost btn-sm" onclick="setManageDef('${esc(v)}')">Set default</button>`}
          <button class="btn btn-ghost btn-sm btn-icon" onclick="removeManageItem(${i})" title="Remove">✕</button>
        </div>
      </div>`).join('')
    : '<div class="hold-empty">No items</div>';
}
function addManageDropdownItem() {
  const v = document.getElementById('manage-dropdown-input').value.trim();
  if (!v) return;
  const items = _mType==='branch'?getBranches(cs.repo):getRepos();
  if (items.includes(v)){toast('Already exists','error');return;}
  items.push(v);
  _mType==='branch'?saveBranches(items,cs.repo):saveRepos(items);
  document.getElementById('manage-dropdown-input').value='';
  renderManageList();
}
function removeManageItem(idx) {
  const items = _mType==='branch'?getBranches(cs.repo):getRepos();
  const removed = items.splice(idx,1)[0];
  _mType==='branch'?saveBranches(items,cs.repo):saveRepos(items);
  const def = _mType==='branch'?getDefBranch(cs.repo):getDefRepo();
  if (def===removed){ _mType==='branch'?setDefBranch(items[0]||'',cs.repo):setDefRepo(items[0]||''); }
  renderManageList();
}
function setManageDef(v) {
  _mType==='branch'?setDefBranch(v,cs.repo):setDefRepo(v);
  if (_mType==='branch') cs.branch=v; else cs.repo=v;
  saveCS(); renderManageList();
}

function initCommitSystem() {
  loadCS();
  if (!cs.repo)   cs.repo   = getDefRepo();
  if (!cs.branch) cs.branch = getDefBranch(cs.repo);
  renderCommitForms();
  document.getElementById('manage-dropdown-input').addEventListener('keydown', e=>{
    if(e.key==='Enter') addManageDropdownItem();
  });
}
</script>
